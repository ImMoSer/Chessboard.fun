# Вычисляем ключ для лимитов: токен сессии (если есть) или IP (для анонимов)
map $cookie_app_session_token $limit_key {
    default $cookie_app_session_token;
    ""      $binary_remote_addr;
}

# Зона лимитов на основе гибридного ключа
limit_req_zone $limit_key zone=api_limit:10m rate=3r/s;
# Статус ответа при превышении лимита
limit_req_status 429;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS-резолвер Docker. Необходим для корректной работы переменных в proxy_pass.
    # 127.0.0.11 - стандартный адрес Docker DNS.
    resolver 127.0.0.11 valid=30s;

    # Gzip Compression
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # Security Headers for WASM and Stockfish
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://extrapawn.com https://en.wikibooks.org https://lichess.org; worker-src 'self' blob:; frame-ancestors 'none';";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 1. Einstiegspunkte: Immer revalidieren (ETag)
    location ~* ^/(index\.html|version\.json)$ {
        add_header Cache-Control "no-cache";
        # Wichtig: Sicherheits-Header müssen hier wiederholt werden (Nginx Inheritance Rule)
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://extrapawn.com https://en.wikibooks.org https://lichess.org; worker-src 'self' blob:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # 2. Haupt-Location (Filter für Dokploy Health-Checks)
    location / {
        if ($http_user_agent ~* "Wget") {
            access_log off;
        }
        try_files $uri $uri/ /index.html;
    }

    # 3. Gehashte Vite-Dateien: Brutal cachen (1 Jahr + immutable)
    location /assets/ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 4. Statische Assets (Bilder, Sounds) - Mit Caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|mp3|wav)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # 5. Statische Engines/WASM (ohne Hash): Clever cachen mit Revalidierung (ETag)
    location ~* \.(?:wasm|nnue)$ {
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location /stockfish/ {
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 6. MJS separat (wegen MIME-Type)
    location ~ \.mjs$ {
        access_log off;
        log_not_found off;
        root /usr/share/nginx/html;
        default_type application/javascript;
        types {
            application/javascript mjs;
        }
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 7. Backend Proxy & API Routing
    location = /api/auth/check {
        internal;
        set $auth_backend http://nest-app:3000/api/auth/check;
        proxy_pass $auth_backend;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Host $host;
    }

    location /api/engine-eval/analyze {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $eval_backend http://nags-eval-service:5000;
        rewrite ^/api/engine-eval/(.*) /$1 break;
        proxy_pass $eval_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/bestmove {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $engine_backend http://engine-hub:5000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $engine_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/opening/mozer_book {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/opening/(.*) /opening/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/opening/player {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/opening/(.*) /opening/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/api/diamond/(white|black) {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/diamond/(.*) /gravity/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $upstream_nest http://nest-app:3000;
        proxy_pass $upstream_nest;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
